{% extends 'base.html' %}
{% load render_table from django_tables2 %}

{% block title %}Menu de Autores{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="text-center">
                {% render_table table %}
                <br>
                <a href="{% url 'autor_create' %}">
                    <input type="button" class="btn btn-primary" value="Incluir novo autor">
                </a>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmação -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="deleteModalLabel">Confirmar Exclusão</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="deleteForm" method="POST" action="">
            {% csrf_token %}
            <div class="modal-body">
              Tem certeza que deseja excluir <strong id="delete-nome"></strong>?
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-danger">Sim, excluir</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var deleteModal = document.getElementById('deleteModal')
            if (deleteModal) {
                deleteModal.addEventListener('show.bs.modal', function (event) {
                    var button = event.relatedTarget
                    var recipient = button.getAttribute('data-bs-id')
                    var nome = button.getAttribute('data-bs-nome')

                    var modalBodyNome = deleteModal.querySelector('#delete-nome')
                    var deleteForm = deleteModal.querySelector('#deleteForm')

                    modalBodyNome.textContent = nome
                    var url = "{% url 'autor_delete' 99999 %}".replace('99999', recipient);
                    deleteForm.action = url;
                })
            }
        });
    </script>
{% endblock %}
